<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oversized Tee - KHATT</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* CONTAINER */
.container{
padding:40px 20px;
}

/* IMAGE */
img{
width:300px;
border-radius:12px;
margin-top:20px;
}

/* PRICE */
.price{
color:#d4af37;
font-size:22px;
margin:10px 0;
}

/* SIZE SELECT */
select{
padding:10px;
border-radius:8px;
margin-top:15px;
}

/* BUTTON */
.btn{
display:block;
width:200px;
margin:15px auto;
padding:12px;
border-radius:10px;
text-decoration:none;
cursor:pointer;
}

.add{
background:#d4af37;
color:black;
border:none;
}

.cart{
background:#25D366;
color:white;
}

.back{
color:#d4af37;
display:block;
margin-top:20px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Oversized Tee</h1>

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<p class="price">499 EGP</p>

<!-- SIZE -->
<p>Choose Size</p>

<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<!-- BUTTONS -->
<button class="btn add" onclick="addToCart()">Add to Cart</button>

<a class="btn cart" href="cart.html">Go to Cart</a>

<a class="back" href="index.html">← Back</a>

</div>

<script>
function addToCart(){

let size = document.getElementById("size").value;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:"Oversized Tee",
price:499,
size:size
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart ✔");
}
</script>

</body>
</html>
