<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT PRODUCT</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
filter:brightness(.25);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,.4), rgba(0,0,0,.95));
z-index:-1;
}

/* CONTAINER */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
padding:120px 80px;
align-items:center;
}

/* IMAGE */

.product-img{
width:100%;
border-radius:20px;
overflow:hidden;
}

.product-img img{
width:100%;
height:500px;
object-fit:cover;
border-radius:20px;
}

/* INFO */

.info h1{
font-size:60px;
font-family:'Cormorant Garamond',serif;
color:#d4af37;
}

.price{
font-size:25px;
margin:15px 0;
color:#d4af37;
}

.desc{
color:#ccc;
line-height:1.8;
margin-bottom:20px;
}

/* SIZE */

.sizes{
display:flex;
gap:10px;
margin:20px 0;
}

.size{
padding:10px 15px;
border:1px solid #d4af37;
cursor:pointer;
border-radius:8px;
transition:.3s;
}

.size:hover{
background:#d4af37;
color:black;
}

/* BUTTON */

.btn{
display:block;
width:100%;
padding:15px;
margin-top:20px;
background:#d4af37;
color:black;
text-align:center;
font-weight:700;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:white;
}

/* BACK */

.back{
position:fixed;
top:20px;
left:20px;
background:#d4af37;
color:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
font-weight:700;
}

/* MOBILE */

@media(max-width:900px){

.container{
grid-template-columns:1fr;
padding:100px 20px;
}

.info h1{
font-size:40px;
}

.product-img img{
height:350px;
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="back" onclick="history.back()">← BACK</div>

<div class="container">

<div class="product-img">
<img id="img" src="">
</div>

<div class="info">

<h1 id="name">Loading...</h1>

<div class="price" id="price"></div>

<p class="desc">
Premium KHATT piece crafted for modern streetwear culture. Minimal design. Maximum presence.
</p>

<div class="sizes">

<div class="size">S</div>
<div class="size">M</div>
<div class="size">L</div>
<div class="size">XL</div>

</div>

<div class="btn" onclick="addToCart()">ADD TO CART</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCo89iKfkZzWSxfPgcg6i-3AnUaeD9Qdvk",
authDomain: "khatt-store-15e5c.firebaseapp.com",
projectId: "khatt-store-15e5c",
storageBucket: "khatt-store-15e5c.firebasestorage.app",
messagingSenderId: "960409478795",
appId: "1:960409478795:web:aa8491cc9be483991c968e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GET ID FROM URL */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let productData = null;

/* LOAD PRODUCT */

async function loadProduct(){

const snap = await getDoc(doc(db, "Products", id));

if(snap.exists()){

productData = snap.data();

document.getElementById("name").innerText = productData.name;
document.getElementById("price").innerText = productData.price + " EGP";
document.getElementById("img").src = productData.image;

}

}

loadProduct();

/* CART */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name: productData.name,
price: productData.price,
image: productData.image
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart 🛒");

}

window.addToCart = addToCart;

</script>

</body>

</html>
