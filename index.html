<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
color:white;

/* LUXURY BACKGROUND */
background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.85)),
url('1781355561879.png');

background-size:cover;
background-position:center;
background-attachment:fixed;
overflow-x:hidden;
}

/* OVERLAY EXTRA LAYER */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* INTRO */
.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 2.5s ease forwards;
animation-delay:2s;
}

.intro img{
width:200px;
filter:drop-shadow(0 0 20px #d4af37);
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
70%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px 60px;
}

.hero h1{
font-size:70px;
color:#d4af37;
letter-spacing:6px;
font-family:'Cormorant Garamond',serif;
}

.hero p{
color:#ccc;
letter-spacing:3px;
margin-top:10px;
}

/* CART */
.cart{
position:fixed;
top:20px;
right:20px;
z-index:999;
}

.cart a{
color:#d4af37;
text-decoration:none;
font-weight:bold;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:rgba(0,0,0,0.6);
border:1px solid rgba(212,175,55,0.4);
padding:15px;
border-radius:12px;
transition:.3s;
backdrop-filter:blur(8px);
}

.card:hover{
transform:translateY(-8px);
border:1px solid #d4af37;
}

.card h3{
color:#fff;
}

.buy{
display:block;
margin-top:10px;
padding:10px;
background:#d4af37;
color:black;
text-align:center;
border-radius:8px;
text-decoration:none;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#777;
margin-top:40px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <img src="Picsart_26-06-13_12-52-16-758.png">
</div>

<!-- CART -->
<div class="cart">
🛒 <a href="cart.html">Cart (<span id="count">0</span>)</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>KHATT</h1>
<p>Luxury Streetwear</p>
</div>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<h3>Oversized Tee</h3>
<p>499 EGP</p>
<a class="buy" href="Oversized.html">View Product</a>
</div>

<div class="card">
<h3>Premium Tee</h3>
<p>499 EGP</p>
<a class="buy" href="Oversized.html">View Product</a>
</div>

<div class="card">
<h3>Essential Tee</h3>
<p>499 EGP</p>
<a class="buy" href="Oversized.html">View Product</a>
</div>

</section>

<footer>
© 2026 KHATT - Luxury Streetwear
</footer>

<script>
function updateCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("count").innerText = cart.length;
}
updateCart();
</script>

</body>
</html>
