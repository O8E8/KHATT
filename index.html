<!DOCTYPE html>
<html>
<head>
<title>KHATT STORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">KHATT</div>
<div onclick="toggleCart()">CART (<span id="count">0</span>)</div>
</header>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<button onclick="openCheckout()">BUY NOW</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<div class="box">

<h3>Checkout KHATT</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">

<select id="city">
<option>Cairo</option>
<option>Alexandria</option>
<option>Other</option>
</select>

<input id="street" placeholder="Street">
<input id="building" placeholder="Building / Floor">

<button onclick="placeOrder()">CONFIRM ORDER</button>

</div>
</div>

<script src="db.js"></script>
<script src="store.js"></script>

</body>
</html>
