<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid rgba(212,175,55,0.2);
}

.logo{
color:#d4af37;
font-weight:700;
letter-spacing:3px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

/* CARD */
.card{
background:#111;
border:1px solid rgba(212,175,55,0.4);
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#d4af37;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#d4af37;
font-weight:bold;
}

/* BUTTON */
.btn{
display:block;
margin-top:10px;
padding:10px;
text-align:center;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

</style>
</head>

<body>

<header>
<div class="logo">KHATT STORE</div>
</header>

<div class="products" id="products"></div>

<script type="module">

// Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCo89iKfkZzWSxfPgcg6i-3AnUaeD9Qdvk",
  authDomain: "khatt-store-15e5c.firebaseapp.com",
  projectId: "khatt-store-15e5c",
  storageBucket: "khatt-store-15e5c.firebasestorage.app",
  messagingSenderId: "960409478795",
  appId: "1:960409478795:web:aa8491cc9be483991c968e"
};

// INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD PRODUCTS
async function loadProducts(){

const querySnapshot = await getDocs(collection(db, "products"));

const container = document.getElementById("products");

querySnapshot.forEach((doc) => {

let p = doc.data();

container.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h3>${p.name}</h3>
<p class="price">${p.price} EGP</p>
<a class="btn" href="product.html?id=${doc.id}">View Product</a>
</div>
</div>
`;

});

}

loadProducts();

</script>

</body>
</html>
