<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1600&q=80') center/cover;
filter:brightness(.3);
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,.4), rgba(0,0,0,.9));
z-index:-1;
}

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:90px;
color:#d4af37;
font-family:'Cormorant Garamond',serif;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:60px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(212,175,55,.2);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(10px);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
cursor:pointer;
}

.card-content{
padding:15px;
}

.price{color:#d4af37;margin:10px 0;}

.btn{
display:block;
padding:12px;
margin-top:10px;
text-align:center;
background:#d4af37;
color:black;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.quick{
background:#111;
color:#d4af37;
border:1px solid #d4af37;
}

.popup, .thankyou{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.hidden{display:none;}

.popup-box, .thank-box{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
border:1px solid #d4af37;
}

.sizes button{
margin:5px;
padding:10px 15px;
background:transparent;
border:1px solid #d4af37;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="hero">
<h1>KHATT</h1>
</div>

<div class="products" id="products"></div>

<!-- POPUP SIZE -->
<div id="popup" class="popup hidden">
<div class="popup-box">
<h2>Select Size</h2>

<div class="sizes">
<button onclick="chooseSize('S')">S</button>
<button onclick="chooseSize('M')">M</button>
<button onclick="chooseSize('L')">L</button>
<button onclick="chooseSize('XL')">XL</button>
</div>

</div>
</div>

<!-- THANK YOU -->
<div id="thankyou" class="thankyou hidden">
<div class="thank-box">
<h1>🎉 THANK YOU</h1>
<p>Your order has been sent successfully</p>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCo89iKfkZzWSxfPgcg6i-3AnUaeD9Qdvk",
authDomain:"khatt-store-15e5c.firebaseapp.com",
projectId:"khatt-store-15e5c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedProduct = null;

/* LOAD PRODUCTS */

async function load(){

const snap = await getDocs(collection(db,"Products"));
const container = document.getElementById("products");

snap.forEach(doc=>{

let p = doc.data();

container.innerHTML += `
<div class="card">

<a href="product.html?id=${doc.id}">
<img src="${p.image}">
</a>

<div class="card-content">

<h3>${p.name}</h3>
<div class="price">${p.price} EGP</div>

<div class="btn quick" onclick='quickBuy("${p.name}","${p.price}")'>QUICK BUY</div>

<div class="btn" onclick='openPopup("${p.name}","${p.price}")'>BUY NOW</div>

</div>

</div>
`;

});

}

load();

/* QUICK BUY */

window.quickBuy = function(name,price){

let msg =
`🛒 KHATT QUICK ORDER%0A`+
`Product: ${name}%0A`+
`Price: ${price} EGP`;

window.open("https://wa.me/201276136180?text="+msg,"_blank");

}

/* BUY NOW */

window.openPopup = function(name,price){

selectedProduct = {name,price};

document.getElementById("popup").classList.remove("hidden");

}

/* SIZE */

window.chooseSize = function(size){

document.getElementById("popup").classList.add("hidden");

let msg =
`🛒 KHATT ORDER%0A%0A`+
`Product: ${selectedProduct.name}%0A`+
`Price: ${selectedProduct.price} EGP%0A`+
`Size: ${size}`;

window.open("https://wa.me/201276136180?text="+msg,"_blank");

document.getElementById("thankyou").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("thankyou").classList.add("hidden");
},2000);

}

</script>

</body>

</html>
