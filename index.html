<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
color:white;
background:black;
overflow-x:hidden;
}

/* BACKGROUND IMAGE */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
z-index:-2;
filter:brightness(0.35) contrast(1.1);
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
z-index:-1;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
animation:fadeOut 2.5s ease forwards;
animation-delay:2s;
}

.intro h1{
font-size:60px;
letter-spacing:12px;
color:#d4af37;
font-family:'Cormorant Garamond',serif;
animation:zoom 1.2s ease;
}

@keyframes zoom{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
letter-spacing:14px;
color:#d4af37;
font-family:'Cormorant Garamond',serif;
text-shadow:0 0 25px rgba(212,175,55,0.2);
}

.hero p{
color:#ccc;
letter-spacing:4px;
margin-top:10px;
font-size:14px;
}

/* SECTION */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
padding:80px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(18px);
border:1px solid rgba(212,175,55,0.15);
border-radius:22px;
overflow:hidden;
transition:0.5s;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
border-color:#d4af37;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
transition:0.5s;
}

.card:hover img{
transform:scale(1.08);
filter:brightness(1.1);
}

.card-content{
padding:18px;
}

.card h3{
font-family:'Cormorant Garamond',serif;
font-size:22px;
margin-bottom:5px;
}

.price{
color:#d4af37;
font-weight:bold;
margin-bottom:10px;
}

.btn{
display:block;
padding:12px;
background:#d4af37;
color:black;
text-align:center;
border-radius:12px;
text-decoration:none;
font-weight:700;
transition:0.3s;
}

.btn:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="overlay"></div>

<!-- INTRO -->
<div class="intro">
<h1>KHATT</h1>
</div>

<!-- HERO -->
<section class="hero">
<h1>KHATT</h1>
<p>LUXURY STREETWEAR EXPERIENCE</p>
</section>
<div id="cartIcon" style="
position:fixed;
top:20px;
right:20px;
background:#d4af37;
color:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
z-index:9999;
">
🛒 <span id="cartCount">0</span>
</div>
<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCo89iKfkZzWSxfPgcg6i-3AnUaeD9Qdvk",
  authDomain: "khatt-store-15e5c.firebaseapp.com",
  projectId: "khatt-store-15e5c",
  storageBucket: "khatt-store-15e5c.firebasestorage.app",
  messagingSenderId: "960409478795",
  appId: "1:960409478795:web:aa8491cc9be483991c968e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){

const snap = await getDocs(collection(db, "Products"));

const container = document.getElementById("products");

snap.forEach(doc => {

let p = doc.data();

container.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h3>${p.name}</h3>
<p class="price">${p.price} EGP</p>
<button class="btn" onclick="addToCart('${p.name}','${p.price}','${p.image}')">
ADD TO CART
</button>

<a class="btn" href="product.html?id=${doc.id}">
BUY NOW
</a>
</div>
</div>
`;

});

}

loadProducts();

</script>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// تحديث العداد
function updateCartCount(){
document.getElementById("cartCount").innerText = cart.length;
}

// إضافة للـ cart
function addToCart(name, price, image){

cart.push({
name,
price,
image
});

localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();

alert("Added to cart ✔");

}

// فتح الكارت (عرض بسيط)
document.getElementById("cartIcon").onclick = function(){

let total = 0;
let items = "";

cart.forEach((p, i) => {
total += Number(p.price);
items += `\n${i+1}. ${p.name} - ${p.price} EGP`;
});

alert("🛒 CART ITEMS:\n" + items + "\n\nTOTAL: " + total + " EGP");

}

updateCartCount();

</script>
</body>
</html>
