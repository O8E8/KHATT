<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT CART</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
}

/* BACKGROUND LUXURY */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
filter:brightness(0.25);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.95));
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
padding:40px 20px;
font-size:40px;
letter-spacing:6px;
font-family:'Cormorant Garamond',serif;
color:#d4af37;
}

/* CART CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* ITEM */
.item{
display:flex;
align-items:center;
gap:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(212,175,55,0.15);
padding:15px;
border-radius:18px;
margin-bottom:15px;
transition:0.3s;
}

.item:hover{
transform:scale(1.02);
border-color:#d4af37;
}

.item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
}

.item h3{
margin:0;
font-size:18px;
font-family:'Cormorant Garamond',serif;
}

.price{
color:#d4af37;
margin-top:5px;
font-weight:bold;
}

/* REMOVE */
.remove{
margin-left:auto;
background:#ff3b3b;
border:none;
color:white;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.remove:hover{
background:#ff0000;
}

/* TOTAL BOX */
.total{
text-align:center;
font-size:26px;
margin-top:30px;
color:#d4af37;
font-family:'Cormorant Garamond',serif;
}

/* CHECKOUT */
.checkout{
display:block;
width:90%;
max-width:400px;
margin:30px auto;
padding:15px;
text-align:center;
background:#d4af37;
color:black;
font-weight:bold;
border-radius:14px;
text-decoration:none;
transition:0.3s;
}

.checkout:hover{
background:white;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="header">YOUR LUXURY CART</div>

<div class="container" id="cartItems"></div>

<div class="total" id="total"></div>

<a class="checkout" onclick="checkout()">CHECKOUT VIA WHATSAPP</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

let container = document.getElementById("cartItems");
container.innerHTML = "";

let total = 0;

cart.forEach((p, index) => {

total += Number(p.price);

container.innerHTML += `
<div class="item">
<img src="${p.image}">
<div>
<h3>${p.name}</h3>
<div class="price">${p.price} EGP</div>
</div>

<button class="remove" onclick="removeItem(${index})">REMOVE</button>
</div>
`;

});

document.getElementById("total").innerText = "TOTAL: " + total + " EGP";

}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

function checkout(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

let msg = "🛒 KHATT ORDER:%0A%0A";

cart.forEach((p,i)=>{
msg += `${i+1}. ${p.name} - ${p.price} EGP%0A`;
});

msg += `%0ATOTAL: ${cart.reduce((a,b)=>a+Number(b.price),0)} EGP`;

window.open(`https://wa.me/201276136180?text=${msg}`);

}

renderCart();

</script>

</body>
</html>
