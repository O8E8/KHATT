<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHATT CART</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
filter:brightness(.2);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(0,0,0,.4), rgba(0,0,0,.95));
z-index:-1;
}

/* TITLE */
.title{
text-align:center;
font-size:60px;
font-family:'Cormorant Garamond',serif;
color:#d4af37;
margin-top:70px;
letter-spacing:5px;
}

/* CART CONTAINER */
.cart-container{
max-width:900px;
margin:30px auto;
padding:20px;
}

/* ITEM */
.item{
display:flex;
gap:15px;
align-items:center;
background:rgba(255,255,255,.04);
padding:15px;
border-radius:15px;
margin-bottom:12px;
border:1px solid rgba(212,175,55,.2);
backdrop-filter:blur(10px);
}

.item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.item h3{
font-size:18px;
font-family:'Cormorant Garamond',serif;
}

.price{
color:#d4af37;
margin-top:5px;
}

.remove{
margin-left:auto;
background:#d4af37;
color:black;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

/* TOTAL */
.total{
text-align:center;
font-size:22px;
margin-top:25px;
color:#d4af37;
}

/* CHECKOUT FORM */
.checkout-form{
max-width:520px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,.05);
border:1px solid rgba(212,175,55,.3);
border-radius:20px;
backdrop-filter:blur(15px);
}

.checkout-form h2{
text-align:center;
color:#d4af37;
margin-bottom:20px;
font-family:'Cormorant Garamond',serif;
}

.checkout-form input,
.checkout-form select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:transparent;
color:white;
outline:none;
}

/* BUTTON */
.checkout-btn{
display:block;
width:100%;
max-width:520px;
margin:20px auto;
padding:15px;
background:#d4af37;
color:black;
text-align:center;
font-weight:700;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.checkout-btn:hover{
background:white;
}

/* EMPTY */
.empty{
text-align:center;
margin-top:60px;
color:#aaa;
}

/* BACK */
.back{
position:fixed;
top:20px;
left:20px;
background:#d4af37;
color:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
font-weight:700;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="back" onclick="history.back()">← BACK</div>

<div class="title">YOUR CART</div>

<div class="cart-container" id="cartContainer"></div>

<div class="total" id="total"></div>

<!-- CHECKOUT FORM -->
<div class="checkout-form">

<h2>CHECKOUT DETAILS</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">

<select id="gov">
<option value="">Governorate</option>
<option>Cairo</option>
<option>Giza</option>
<option>Alexandria</option>
<option>Other</option>
</select>

<input type="text" id="city" placeholder="City">
<input type="text" id="street" placeholder="Street / Full Address">

</div>

<div class="checkout-btn" onclick="checkout()">
CHECKOUT VIA WHATSAPP
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");
const totalEl = document.getElementById("total");

function render(){

container.innerHTML = "";

if(cart.length === 0){
container.innerHTML = `<div class="empty">Your cart is empty 🛒</div>`;
totalEl.innerHTML = "";
return;
}

let total = 0;

cart.forEach((item,index)=>{

total += Number(item.price);

container.innerHTML += `
<div class="item">

<img src="${item.image}">

<div>
<h3>${item.name}</h3>
<div class="price">${item.price} EGP</div>
</div>

<div class="remove" onclick="removeItem(${index})">
REMOVE
</div>

</div>
`;

});

totalEl.innerHTML = "TOTAL: " + total + " EGP";
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

function checkout(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let gov = document.getElementById("gov").value;
let city = document.getElementById("city").value;
let street = document.getElementById("street").value;

if(!name || !phone || !gov || !city || !street){
alert("Please fill all fields!");
return;
}

let message = `🛒 KHATT ORDER:%0A%0A`;

message += `👤 Name: ${name}%0A`;
message += `📞 Phone: ${phone}%0A`;
message += `📍 Address: ${gov}, ${city}, ${street}%0A%0A`;

message += `📦 ITEMS:%0A`;

cart.forEach(item=>{
message += `- ${item.name} (${item.price} EGP)%0A`;
});

let total = cart.reduce((sum,item)=>sum + Number(item.price),0);

message += `%0A💰 TOTAL: ${total} EGP`;

window.open("https://wa.me/201276136180?text=" + message,"_blank");

}

render();

</script>

</body>

</html>
